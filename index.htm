<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沙漠倾城网页消消乐</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
  body{
    background: radial-gradient(circle at top, #2b2d42, #12141d);
    min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px;color:#fff;
  }
  .game-wrap{
    background: linear-gradient(145deg, rgba(40,44,65,0.9), rgba(26,28,42,0.9));
    border-radius:24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 40px rgba(120,110,255,0.15);
    padding:20px;max-width:440px;width:100%;backdrop-filter: blur(10px);
  }
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .title{font-size:22px;font-weight:800;background:linear-gradient(90deg,#a8b8ff,#e0a8ff);-webkit-background-clip:text;color:transparent}
  .info{display:flex;gap:10px}
  .box{
    background:rgba(255,255,255,0.08);
    padding:10px 14px;border-radius:14px;font-size:14px;font-weight:700;color:#e6e9ff;
    border:1px solid rgba(255,255,255,0.12);
  }
  .board{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:12px 0}
  .cell{
    width:100%;aspect-ratio:1/1;border-radius:18px;
    display:flex;align-items:center;justify-content:center;font-size:28px;
    cursor:pointer;transition:all .2s ease;
    background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(0,0,0,0.2));
    border:1px solid rgba(255,255,255,0.18);
    box-shadow: 0 8px 18px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .cell:hover{transform:scale(1.06)}
  .cell.selected{outline:3px solid #9fa8ff;outline-offset:2px}
  .cell.pop{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)}}
  .cell.fall{animation:fall .4s ease}
  @keyframes fall{from{transform:translateY(-140px);opacity:0}to{transform:translateY(0);opacity:1}}
  .btns{display:flex;gap:10px;margin-top:12px}
  button{
    flex:1;padding:14px;border:none;border-radius:16px;
    background:linear-gradient(90deg,#7c7bff,#b87bff);
    color:#fff;font-weight:800;cursor:pointer;transition:.25s;
    box-shadow:0 8px 20px rgba(124,123,255,0.35)
  }
  button:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(124,123,255,0.45)}
  button.gray{background:linear-gradient(90deg,#3a3c5a,#4b4d70);color:#e6e9ff}
  .msg{text-align:center;margin-top:12px;font-weight:800;color:#c8b6ff;height:26px}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="top">
    <div class="title">沙漠倾城网页消消乐</div>
    <div class="info">
      <div class="box">分数 <span id="score">0</span></div>
      <div class="box">关卡 <span id="level">1</span></div>
      <div class="box">步数 <span id="steps">30</span></div>
    </div>
  </div>
  <div class="board" id="board"></div>
  <div class="btns">
    <button id="restart">重新开始</button>
    <button id="skin" class="gray">换皮肤</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script>
const board=document.getElementById('board');
const scoreEl=document.getElementById('score');
const levelEl=document.getElementById('level');
const stepsEl=document.getElementById('steps');
const msgEl=document.getElementById('msg');
const restartBtn=document.getElementById('restart');
const skinBtn=document.getElementById('skin');

const size=6;
let score=0,level=1,steps=30;
let grid=[];
let selected=null;
let skinIndex=0;

// ✅ 全新立体透明、色差明显、大气图案（无白底、不伤眼）
const skins=[
  {
    name:'高级糖果',
    icons:['🍭','🍬','🍡','🍧','🍫','🍮']
  },
  {
    name:'清新水果',
    icons:['🍇','🍓','🍑','🍍','🥝','🍒']
  },
  {
    name:'璀璨宝石',
    icons:['💎','🔮','💠','💍','💎','💎']
  }
];

let icons=skins[0].icons;

function rand(){return icons[Math.floor(Math.random()*icons.length)]}
function makeGrid(){
  let g=[];
  for(let r=0;r<size;r++){
    let row=[];
    for(let c=0;c<size;c++){
      let v;
      do{v=rand()}while(
        (c>=2&&row[c-1]==v&&row[c-2]==v)||
        (r>=2&&g[r-1][c]==v&&g[r-2][c]==v)
      );
      row.push(v);
    }
    g.push(row);
  }
  return g;
}

function render(){
  board.innerHTML='';
  grid.forEach((row,r)=>{
    row.forEach((cell,c)=>{
      const div=document.createElement('div');
      div.className='cell';
      div.dataset.r=r;div.dataset.c=c;
      div.textContent=cell;
      div.addEventListener('click',()=>click(r,c));
      board.appendChild(div);
    });
  });
  scoreEl.textContent=score;
  levelEl.textContent=level;
  stepsEl.textContent=steps;
}

function click(r,c){
  if(steps<=0)return;
  const cell=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!selected){selected={r,c};cell.classList.add('selected');return;}
  const sr=selected.r,sc=selected.c;
  const dist=Math.abs(r-sr)+Math.abs(c-sc);
  if(dist!==1){clearSel();selected={r,c};cell.classList.add('selected');return;}
  swap(sr,sc,r,c);
  if(hasMatch()){
    steps--;play('click');clearSel();
    setTimeout(process,150);
  }else{swap(sr,sc,r,c);clearSel();}
}

function swap(r1,c1,r2,c2){[grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];render();}
function clearSel(){document.querySelectorAll('.cell.selected').forEach(d=>d.classList.remove('selected'));selected=null;}

function hasMatch(){
  for(let r=0;r<size;r++)for(let c=0;c<size-2;c++){
    const v=grid[r][c];
    if(v&&v===grid[r][c+1]&&v===grid[r][c+2])return true;
  }
  for(let c=0;c<size;c++)for(let r=0;r<size-2;r++){
    const v=grid[r][c];
    if(v&&v===grid[r+1][c]&&v===grid[r+2][c])return true;
  }
  return false;
}

function getMatches(){
  let match=new Set();
  for(let r=0;r<size;r++)for(let c=0;c<size-2;c++){
    const v=grid[r][c];
    if(v&&v===grid[r][c+1]&&v===grid[r][c+2]){
      match.add(`${r},${c}`);match.add(`${r},${c+1}`);match.add(`${r},${c+2}`);
    }
  }
  for(let c=0;c<size;c++)for(let r=0;r<size-2;r++){
    const v=grid[r][c];
    if(v&&v===grid[r+1][c]&&v===grid[r+2][c]){
      match.add(`${r},${c}`);match.add(`${r+1},${c}`);match.add(`${r+2},${c}`);
    }
  }
  return Array.from(match).map(s=>s.split(',').map(Number));
}

function process(){
  const matches=getMatches();
  if(matches.length===0){
    if(steps<=0){msgEl.textContent='步数用完啦，重来一局！';return;}
    if(score>=level*500){level++;steps+=15;msgEl.textContent='🎉 过关！步数+15';setTimeout(()=>msgEl.textContent='',1500);}
    return;
  }
  matches.forEach(([r,c])=>{
    const div=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    div.classList.add('pop');
    setTimeout(()=>div.classList.remove('pop'),350);
  });
  play('pop');
  score+=matches.length*10;
  matches.forEach(([r,c])=>grid[r][c]=null);
  setTimeout(fill,300);
}

function fill(){
  for(let c=0;c<size;c++){
    let col=[];
    for(let r=0;r<size;r++)if(grid[r][c])col.push(grid[r][c]);
    const newCol=[...Array(size-col.length).fill(null),...col];
    for(let r=0;r<size;r++)grid[r][c]=newCol[r];
  }
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    if(!grid[r][c])grid[r][c]=rand();
  }
  render();
  setTimeout(process,200);
}

function play(type){
  try{
    const a=new AudioContext();
    const o=a.createOscillator();
    const g=a.createGain();
    o.connect(g);g.connect(a.destination);
    if(type==='pop'){o.frequency.value=620;g.gain.value=0.16;o.start();o.stop(a.currentTime+0.12);}
    if(type==='click'){o.frequency.value=840;g.gain.value=0.11;o.start();o.stop(a.currentTime+0.08);}
  }catch(e){}
}

restartBtn.addEventListener('click',()=>{score=0;level=1;steps=30;grid=makeGrid();render();msgEl.textContent='';});
skinBtn.addEventListener('click',()=>{
  skinIndex=(skinIndex+1)%skins.length;
  icons=skins[skinIndex].icons;
  skinBtn.textContent=`换皮肤(${skins[skinIndex].name})`;
  grid=makeGrid();render();
});

grid=makeGrid();render();
skinBtn.textContent=`换皮肤(${skins[0].name})`;
</script>
</body>
</html>
